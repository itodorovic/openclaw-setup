#cloud-config

package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - git
  - unattended-upgrades
  - update-notifier-common

write_files:
  # Docker daemon: log rotation to prevent disk exhaustion on small droplets
  - path: /etc/docker/daemon.json
    permissions: '0644'
    content: |
      {
        "log-driver": "json-file",
        "log-opts": {
          "max-size": "10m",
          "max-file": "3"
        }
      }

  # Automatic daily security updates
  - path: /etc/apt/apt.conf.d/20auto-upgrades
    permissions: '0644'
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";

  - path: /etc/apt/apt.conf.d/50unattended-upgrades
    permissions: '0644'
    content: |
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "04:00";

  - path: /root/.openclaw-env
    permissions: '0600'
    content: |
      # Generated by Terraform -- re-run 'terraform apply' to update.
      DOMAIN_NAME=${domain_name}
      ADMIN_DOMAIN=${admin_domain}
      STATUS_DOMAIN=${status_domain}
      CLOUDFLARE_TUNNEL_TOKEN=${cloudflare_tunnel_token}
      OPENCLAW_GATEWAY_AUTH_MODE=${gateway_auth_mode}
      OPENCLAW_GATEWAY_TOKEN=${gateway_token}
      DOCKER_GID=__DOCKER_GID__
      AWS_S3_BUCKET_NAME=${s3_bucket}
      AWS_ACCESS_KEY_ID=${s3_access_key}
      AWS_SECRET_ACCESS_KEY=${s3_secret_key}
      AWS_REGION=${s3_region}
      AWS_ENDPOINT=${s3_endpoint}
      BACKUP_ARCHIVE_PASSWORD=${backup_password}

  - path: /root/.openclaw-config.json
    permissions: '0644'
    content: |
      {
        "agents": {
          "defaults": {
            "model": {
              "primary": "${openclaw_model}"
            },
            "workspace": "~/.openclaw/workspace",
            "memorySearch": {
              "enabled": false
            }
          }
        },
        "gateway": {
          "bind": "lan",
          "auth": {
            "mode": "token",
            "rateLimit": {
              "maxAttempts": 10,
              "windowMs": 60000,
              "lockoutMs": 300000
            }
          },
          "mode": "local",
          "controlUi": {
            "allowedOrigins": ["https://${domain_name}"]
          },
          "trustedProxies": ["172.16.0.0/12", "10.0.0.0/8"]
        },
        "tools": {
          "profile": "coding"
        },
        "session": {
          "dmScope": "per-channel-peer"
        },
        "browser": {
          "enabled": ${browser_enabled}
        },
        "discovery": {
          "mdns": { "mode": "off" }
        },
        "logging": {
          "redactSensitive": "tools"
        }
      }

  - path: /root/.openclaw-init-packages.sh
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Re-installs extra apt packages inside the gateway container.
      # Called on first boot and can be re-run after Watchtower recreates.
      set -euo pipefail
      CONTAINER="openclaw-gateway"
      PACKAGES="${extra_apt_packages}"
      # Allow the node user to run npm global installs (enables dashboard "Update now" button)
      docker exec -u root "$CONTAINER" bash -c "chown -R node:node /usr/local/lib/node_modules /usr/local/bin" 2>/dev/null || true
      if [ -n "$PACKAGES" ]; then
        docker exec -u root "$CONTAINER" bash -c "apt-get update -qq && apt-get install -yqq $PACKAGES"
      fi
      if [ "${browser_enabled}" = "true" ]; then
        docker exec "$CONTAINER" node /app/node_modules/playwright-core/cli.js install chromium 2>/dev/null || true
      fi
      # Restart admin container: it shares the gateway's network namespace,
      # so if the gateway was OOM-killed/restarted during Chromium install,
      # the admin's ttyd loses its socket binding.
      docker restart openclaw-admin 2>/dev/null || true

runcmd:
  # 1. Swap for stability on 2 GB droplets
  - bash -lc 'if [ ! -f /swapfile ]; then fallocate -l 4G /swapfile && chmod 600 /swapfile && mkswap /swapfile; fi'
  - bash -lc 'swapon --show | grep -q "/swapfile" || swapon /swapfile'
  - bash -lc 'grep -q "^/swapfile none swap sw 0 0$" /etc/fstab || echo "/swapfile none swap sw 0 0" >> /etc/fstab'

  # 2. Docker official repository
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /usr/share/keyrings/docker-archive-keyring.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update

  # 3. Install Docker + Compose plugin
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin

  # 3b. Set Docker GID in .env template (for admin container group_add)
  - 'sed -i "s/__DOCKER_GID__/$(getent group docker | cut -d: -f3)/" /root/.openclaw-env'

  # 4. Clone repository
  - bash -lc 'if [ ! -d /root/openclaw-setup/.git ]; then git clone ${repo_clone_url} /root/openclaw-setup; else git -C /root/openclaw-setup pull --ff-only; fi'

  # 5. Install ttyd (web terminal for admin console) and lazydocker (container TUI)
  - curl -fsSL -o /usr/local/bin/ttyd https://github.com/tsl0922/ttyd/releases/download/1.7.7/ttyd.x86_64
  - chmod 755 /usr/local/bin/ttyd
  - curl -fsSL https://github.com/jesseduffield/lazydocker/releases/download/v0.24.4/lazydocker_0.24.4_Linux_x86_64.tar.gz | tar xz -C /usr/local/bin lazydocker
  - chmod 755 /usr/local/bin/lazydocker

  # 6. Install Terraform-generated .env
  - cp /root/.openclaw-env /root/openclaw-setup/.env
  - chmod 600 /root/openclaw-setup/.env

  # 7. Pull images and create volumes before writing config
  - cd /root/openclaw-setup && docker compose pull

  # 8. Start gateway briefly to initialize volume structure, then stop
  - cd /root/openclaw-setup && docker compose up -d openclaw-gateway
  - sleep 10
  - cd /root/openclaw-setup && docker compose stop openclaw-gateway

  # 9. Copy openclaw.json into the named volume and lock down permissions
  - |
    VOLUME_PATH=$(docker volume inspect openclaw-setup_openclaw_data --format '{{ .Mountpoint }}')
    cp /root/.openclaw-config.json "$VOLUME_PATH/openclaw.json"
    chmod 600 "$VOLUME_PATH/openclaw.json"
    chmod 700 "$VOLUME_PATH"
    chown -R 1000:1000 "$VOLUME_PATH"

  # 10. Launch the full stack
  - cd /root/openclaw-setup && docker compose up -d

  # 11. Install extra apt packages + Chromium browser (if enabled)
  - |
    echo "Waiting for gateway to be healthy before installing packages..."
    for i in $(seq 1 30); do
      STATUS=$(docker inspect openclaw-gateway --format '{{.State.Health.Status}}' 2>/dev/null || echo 'missing')
      [ "$STATUS" = "healthy" ] && break
      echo "  [$i/30] gateway: $STATUS"
      sleep 5
    done
  - /root/.openclaw-init-packages.sh

  # 12. Post-boot health check
  - |
    sleep 15
    docker exec openclaw-gateway node /app/dist/index.js doctor 2>&1 || true

  # 13. Install init-packages script as a cron job to survive Watchtower recreates
  - |
    cat > /etc/cron.d/openclaw-reinstall-packages <<'CRON'
    # After Watchtower recreates the gateway, re-apply apt packages + Chromium.
    # Runs every 15 min; exits instantly if packages are already present.
    */15 * * * * root /root/.openclaw-init-packages.sh >> /var/log/openclaw-init.log 2>&1
    CRON
    sed -i 's/^    //' /etc/cron.d/openclaw-reinstall-packages
    chmod 644 /etc/cron.d/openclaw-reinstall-packages

  # 14. Cloudflared will be restarted by Terraform after tunnel config is created.
  # No timer needed -- Terraform handles this via a remote-exec provisioner
  # that runs AFTER the tunnel ingress config is pushed to Cloudflare.

  # 15. Scrub secrets from cloud-init logs
  - truncate -s 0 /var/log/cloud-init-output.log
  - sed -i '/TUNNEL_TOKEN\|GATEWAY_TOKEN\|SECRET_ACCESS_KEY\|ARCHIVE_PASSWORD/d' /var/log/cloud-init.log
  - rm -f /root/.openclaw-env /root/.openclaw-config.json
