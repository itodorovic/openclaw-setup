services:
  # 1. The Core AI Agent
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-gateway
    restart: unless-stopped
    volumes:
      - openclaw_data:/home/node/.openclaw
      - openclaw_home:/home/node
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_AUTH_MODE=${OPENCLAW_GATEWAY_AUTH_MODE:-token}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - OPENCLAW_GATEWAY_BIND=lan
      - PLAYWRIGHT_BROWSERS_PATH=/home/node/.cache/ms-playwright
      - NODE_COMPILE_CACHE=/home/node/.cache/node-compile
      - OPENCLAW_NO_RESPAWN=1
    security_opt:
      - no-new-privileges:true
    mem_limit: 2048m
    healthcheck:
      test:
        - CMD-SHELL
        - node -e "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 5

  # 1b. Admin Console (web terminal for device management & CLI access)
  openclaw-admin:
    image: ${OPENCLAW_IMAGE:-ghcr.io/openclaw/openclaw:latest}
    container_name: openclaw-admin
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    volumes:
      - openclaw_data:/home/node/.openclaw
      - openclaw_home:/home/node
      - ./scripts/admin:/admin:ro
      - /usr/local/bin/ttyd:/usr/local/bin/ttyd:ro
      - /usr/local/bin/lazydocker:/usr/local/bin/lazydocker:ro
      - /usr/bin/docker:/usr/bin/docker:ro
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - "${DOCKER_GID:-988}"
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    entrypoint: ["/usr/local/bin/ttyd", "-p", "7681", "-W", "bash", "/admin/menu.sh"]

  # 2. Reverse Proxy & Security
  caddy-proxy:
    image: ${CADDY_IMAGE:-caddy@sha256:fce4f15aad23222c0ac78a1220adf63bae7b94355d5ea28eee53910624acedfa}
    container_name: caddy-proxy
    restart: unless-stopped
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    env_file:
      - .env
    # Ports removed for maximum security; traffic now flows through the Tunnel
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      - ADMIN_DOMAIN=${ADMIN_DOMAIN}
      - STATUS_DOMAIN=${STATUS_DOMAIN}

  # 3. Secure Cloudflare Tunnel
  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0}
    container_name: cloudflared
    restart: unless-stopped
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    env_file:
      - .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:?CLOUDFLARE_TUNNEL_TOKEN is required}

  # 4. Automated Zero-Downtime Updates
  watchtower:
    image: ${WATCHTOWER_IMAGE:-containrrr/watchtower@sha256:6dd50763bbd632a83cb154d5451700530d1e44200b268a4e9488fefdfcf2b038}
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=0 0 4 * * * # Pull and update at 4 AM every day
      - DOCKER_API_VERSION=1.40
    mem_limit: 128m

  # 5. Nightly Encrypted Off-Site Backups
  volume-backup:
    image: offen/docker-volume-backup:v2
    container_name: volume-backup
    restart: unless-stopped
    volumes:
      - openclaw_data:/backup/openclaw_data:ro
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    environment:
      BACKUP_CRON_EXPRESSION: "0 3 * * *"
      BACKUP_RETENTION_LOCAL: "7"
    mem_limit: 256m

  # 6. Docker Log Viewer & Container Monitor
  dozzle:
    image: ${DOZZLE_IMAGE:-amir20/dozzle@sha256:a8419b054f7a2737d82bb6deea0b48fd8b348d78e333644db55a9c09d2ce5cfe}
    container_name: dozzle
    restart: unless-stopped
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_NO_ANALYTICS=true

volumes:
  openclaw_data:
  openclaw_home:
  caddy_data:
  caddy_config:
